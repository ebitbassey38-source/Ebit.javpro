<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Expense Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f6fa;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 32px 24px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 22px;
    margin-bottom: 16px;
    text-align: center;
    color: #2c3e50;
  }
  p.subtitle {
    font-size: 14px;
    color: #666;
    text-align: center;
    margin-bottom: 24px;
  }
  .field {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
  }
  input:focus {
    outline: none;
    border-color: #4a69bd;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #4a69bd;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .error {
    background: #fdecea;
    color: #c0392b;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .success {
    background: #eafaf1;
    color: #27ae60;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .back-link {
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
  }
  .back-link a {
    color: #4a69bd;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Forgot Password</h1>
  <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
  <div class="error" id="errorBox"></div>
  <div class="success" id="successBox"></div>

  <form id="forgotForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <button type="submit" id="submitBtn">Send Reset Link</button>
  </form>

  <div class="back-link"><a href="/login.html">Back to Log In</a></div>
</div>

<script>
  const errorBox = document.getElementById('errorBox');
  const successBox = document.getElementById('successBox');
  const form = document.getElementById('forgotForm');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    successBox.style.display = 'none';

    const email = document.getElementById('email').value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    try {
      const res = await fetch('/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Something went wrong');
      }

      successBox.textContent = data.message || 'If an account exists with that email, a reset link has been sent.';
      successBox.style.display = 'block';
      form.style.display = 'none';

    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';
    }
  });
</script>

</body>
</html>
