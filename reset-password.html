<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Expense Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f6fa;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 32px 24px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 22px;
    margin-bottom: 16px;
    text-align: center;
    color: #2c3e50;
  }
  p.subtitle {
    font-size: 14px;
    color: #666;
    text-align: center;
    margin-bottom: 24px;
  }
  .field {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
  }
  input:focus {
    outline: none;
    border-color: #4a69bd;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #4a69bd;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .error {
    background: #fdecea;
    color: #c0392b;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .success {
    background: #eafaf1;
    color: #27ae60;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .back-link {
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
  }
  .back-link a {
    color: #4a69bd;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="card">
  <h1 id="pageTitle">Reset Password</h1>
  <p class="subtitle" id="pageSubtitle">Enter your new password below.</p>
  <div class="error" id="errorBox"></div>
  <div class="success" id="successBox"></div>

  <form id="resetForm">
    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters" required>
    </div>
    <button type="submit" id="submitBtn">Reset Password</button>
  </form>

  <div class="back-link"><a href="/login.html">Back to Log In</a></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  const errorBox = document.getElementById('errorBox');
  const successBox = document.getElementById('successBox');
  const form = document.getElementById('resetForm');
  const submitBtn = document.getElementById('submitBtn');

  if (!token) {
    document.getElementById('pageTitle').textContent = 'Invalid Link';
    document.getElementById('pageSubtitle').textContent = 'This password reset link is missing a token. Please request a new one.';
    form.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    successBox.style.display = 'none';

    const newPassword = document.getElementById('newPassword').value;

    if (newPassword.length < 8) {
      errorBox.textContent = 'Password must be at least 8 characters';
      errorBox.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Resetting...';

    try {
      const res = await fetch('/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Something went wrong');
      }

      successBox.textContent = 'Password reset successfully! Redirecting to login...';
      successBox.style.display = 'block';
      form.style.display = 'none';

      setTimeout(() => {
        window.location.href = '/login.html';
      }, 2000);

    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  });
</script>

</body>
</html>
